[terminal.shell]
program = "/usr/local/bin/fish"

[colors]
draw_bold_text_with_bright_colors = true

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.glyph_offset]
x = 0
y = 0

[keyboard]
bindings = [{ key = 'Slash', mods = 'Control', chars = '\x1b[47;5u' }]

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font Mono"

[window.padding]
x = 10
y = 10

[general]
live_config_reload = true
import = ["~/.config/alacritty/tokyonight_night.toml"]

[window]
option_as_alt = "Both"
